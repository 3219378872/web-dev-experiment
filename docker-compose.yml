x-java-service: &java-service
  restart: unless-stopped
  environment: &java-env
    hm.db.host: mysql
    hm.db.port: "3306"
    hm.db.username: root
    hm.db.password: root
    hm.db.pw: root
    hm.nacos.host: nacos
    hm.nacos.port: "8848"
    hm.redis.host: redis
    hm.redis.port: "6379"
    spring.rabbitmq.host: rabbitmq
    spring.rabbitmq.port: "5672"
    spring.rabbitmq.username: ${RABBITMQ_DEFAULT_USER:-hmall}
    spring.rabbitmq.password: ${RABBITMQ_DEFAULT_PASS:-hmall}
    spring.rabbitmq.publisher-confirm-type: correlated
    spring.rabbitmq.publisher-returns: "true"
    spring.cloud.nacos.server-addr: nacos:8848
    hm.seata.host: seata-server

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hmall
    ports: ["3306:3306"]
    volumes:
      - "./docker/mysql:/var/lib/mysql"
      - "./docs/sql/init-all-tables.sql:/docker-entrypoint-initdb.d/init-all-tables.sql:ro"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  nacos:
    image: nacos/nacos-server:v2.1.0
    restart: unless-stopped
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
    ports: ["8848:8848", "9848:9848"]
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s

  redis:
    image: redis:7.0
    restart: unless-stopped
    ports: ["6379:6379"]

  rabbitmq:
    image: rabbitmq:3.13-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-hmall}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-hmall}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  seata-server:
    image: seataio/seata-server:1.8.0
    restart: unless-stopped
    environment:
      SEATA_IP: seata-server
      SEATA_PORT: "8091"
      STORE_MODE: file
      # 以 Nacos 作注册中心，store 用 file（样例项目，无需额外 DB 表）
      registry.type: nacos
      registry.nacos.server-addr: nacos:8848
      registry.nacos.namespace: ""
      registry.nacos.group: SEATA_GROUP
      registry.nacos.application: seata-server
      registry.nacos.username: nacos
      registry.nacos.password: nacos
    ports:
      - "7091:7091"
      - "8091:8091"
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7091/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MC_HOST_local: http://${MINIO_ROOT_USER:-minioadmin}:${MINIO_ROOT_PASSWORD:-minioadmin}@localhost:9000
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - "./docker/minio:/data"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set local http://minio:9000 "${MINIO_ROOT_USER:-minioadmin}" "${MINIO_ROOT_PASSWORD:-minioadmin}"
        mc mb --ignore-existing local/hmall
        mc anonymous set download local/hmall
        echo "minio bucket hmall ready (public download)"

  nacos-init:
    image: curlimages/curl:latest
    restart: "no"
    # curlimages/curl 默认非 root（uid 100），apk add python3 会 Permission denied；
    # 路由脚本需 python3 做 URL 编码，故以 root 运行该一次性 init 容器。
    user: root
    depends_on:
      nacos:
        condition: service_healthy
    volumes:
      - "./scripts:/scripts:ro"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache python3 >/dev/null 2>&1 || true
        echo "Waiting for Nacos to be ready..."
        for i in $$(seq 1 30); do
          if curl -sf http://nacos:8848/nacos/v1/console/health/readiness >/dev/null 2>&1; then
            echo "Nacos ready, seeding gateway routes..."
            sh /scripts/init-nacos-routes.sh http://nacos:8848
            exit $$?
          fi
          sleep 2
        done
        echo "ERROR: Nacos not ready after 60s" >&2
        exit 1

  hm-gateway:
    <<: *java-service
    build: ./hm-gateway
    ports: ["8080:8080"]
    depends_on:
      nacos:
        condition: service_healthy
      nacos-init:
        condition: service_completed_successfully

  user-service:
    <<: *java-service
    build: ./user-service
    environment:
      <<: *java-env
      SEATA_ENABLED: "true"
    depends_on:
      nacos:
        condition: service_healthy
      nacos-init:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      seata-server:
        condition: service_healthy

  item-service:
    <<: *java-service
    build: ./item-service
    environment:
      <<: *java-env
      SEATA_ENABLED: "true"
    depends_on:
      nacos:
        condition: service_healthy
      nacos-init:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      seata-server:
        condition: service_healthy

  cart-service:
    <<: *java-service
    build: ./cart-service
    environment:
      hm.db.host: mysql
      hm.db.port: "3306"
      hm.db.username: root
      hm.db.password: root
      hm.db.pw: root
      hm.nacos.host: nacos
      hm.nacos.port: "8848"
      hm.redis.host: redis
      hm.redis.port: "6379"
      spring.rabbitmq.host: rabbitmq
      spring.rabbitmq.port: "5672"
      spring.rabbitmq.username: ${RABBITMQ_DEFAULT_USER:-hmall}
      spring.rabbitmq.password: ${RABBITMQ_DEFAULT_PASS:-hmall}
      spring.rabbitmq.publisher-confirm-type: correlated
      spring.rabbitmq.publisher-returns: "true"
      spring.cloud.nacos.server-addr: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hmall?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
    depends_on:
      nacos:
        condition: service_healthy
      nacos-init:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  trade-service:
    <<: *java-service
    build: ./trade-service
    environment:
      <<: *java-env
      SEATA_ENABLED: "true"
    depends_on:
      nacos:
        condition: service_healthy
      nacos-init:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      seata-server:
        condition: service_healthy

  pay-service:
    <<: *java-service
    build: ./pay-service
    environment:
      <<: *java-env
      SEATA_ENABLED: "true"
    depends_on:
      nacos:
        condition: service_healthy
      nacos-init:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      seata-server:
        condition: service_healthy

  notify-service:
    <<: *java-service
    build: ./notify-service
    depends_on:
      nacos:
        condition: service_healthy
      nacos-init:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  file-service:
    <<: *java-service
    build: ./file-service
    environment:
      <<: *java-env
      hm.minio.host: minio
      hm.minio.port: "9000"
      hm.minio.access-key: ${MINIO_ROOT_USER:-minioadmin}
      hm.minio.secret-key: ${MINIO_ROOT_PASSWORD:-minioadmin}
      hm.minio.bucket: hmall
    depends_on:
      nacos:
        condition: service_healthy
      nacos-init:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  smoke-test:
    image: curlimages/curl:latest
    restart: "no"
    depends_on:
      hm-gateway:
        condition: service_started
    volumes:
      - "./scripts/smoke:/smoke:ro"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache jq >/dev/null 2>&1 || true
        echo "Waiting for all services to be ready..."
        for i in $$(seq 1 40); do
          ITEMS=$$(curl -sf -o /dev/null -w '%{http_code}' "http://hm-gateway:8080/items/page?page=1&size=1" 2>/dev/null || echo "000")
          CATS=$$(curl -sf -o /dev/null -w '%{http_code}' "http://hm-gateway:8080/categories" 2>/dev/null || echo "000")
          NOTIFY=$$(curl -sf -o /dev/null -w '%{http_code}' "http://hm-gateway:8080/notifications/active" 2>/dev/null || echo "000")
          # user-service: POST /users/login with bad creds returns 400/401 if service is up
          USER=$$(curl -s -o /dev/null -w '%{http_code}' -X POST -H 'Content-Type: application/json' -d '{"username":"x","password":"x"}' "http://hm-gateway:8080/users/login" 2>/dev/null || echo "000")
          if [ "$$ITEMS" = "200" ] && [ "$$CATS" = "200" ] && [ "$$NOTIFY" = "200" ] && ([ "$$USER" = "400" ] || [ "$$USER" = "401" ]); then
            echo "All services ready, running smoke tests..."
            sh /smoke/smoke.sh http://hm-gateway:8080
            exit $$?
          fi
          echo "  Attempt $$i: items=$$ITEMS categories=$$CATS notifications=$$NOTIFY user=$$USER"
          sleep 3
        done
        echo "ERROR: Services not ready after 120s" >&2
        exit 1

  hmall-web:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - "./hmall-web/dist:/usr/share/nginx/html"
      - "./hmall-web/nginx.conf:/etc/nginx/conf.d/default.conf"
    ports: ["80:80"]
    depends_on:
      - hm-gateway

  hmall-admin:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - "./hmall-admin/dist:/usr/share/nginx/html"
      - "./hmall-admin/nginx.conf:/etc/nginx/conf.d/default.conf"
    ports: ["81:80"]
    depends_on:
      - hm-gateway
