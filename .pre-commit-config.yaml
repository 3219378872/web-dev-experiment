repos:
  - repo: local
    hooks:
      - id: engineering-lint
        name: Engineering Lint
        description: Validates md links, CLAUDE/AGENTS sync, and harness compliance.
        entry: python3 scripts/engineering-lint.py
        language: system
        files: '\.(md|py|yaml|yml|java|vue|ts|js)$'
        pass_filenames: false
        always_run: true
      - id: frontend-lint
        name: Frontend Lint
        description: Formats with Prettier and lints with ESLint on staged frontend files.
        entry: bash scripts/pre-commit-frontend.sh
        language: system
        files: '\.(js|vue|ts|css)$'
        pass_filenames: false
        always_run: true
