<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>好集后台 · 管理员登录</title>
<link rel="stylesheet" href="../assets/app.css">
<link rel="stylesheet" href="../assets/admin.css">
<style>
  body{margin:0;}
  .alogin{min-height:100vh;display:grid;grid-template-columns:1.1fr 1fr;}
  .al-side{background:linear-gradient(150deg,#1E2128,#2A1B14 70%,#46201A);color:#fff;padding:54px 60px;display:flex;flex-direction:column;position:relative;overflow:hidden;}
  .al-side .blob{position:absolute;border-radius:50%;}
  .al-side .b1{width:380px;height:380px;background:radial-gradient(circle,rgba(255,77,46,.3),transparent 70%);right:-120px;top:-80px;}
  .al-side .b2{width:300px;height:300px;background:radial-gradient(circle,rgba(255,176,32,.18),transparent 70%);left:-100px;bottom:-80px;}
  .al-side .brand{display:flex;align-items:center;gap:12px;}
  .al-side .brand .mark{width:48px;height:48px;border-radius:13px;background:linear-gradient(135deg,var(--brand),var(--brand-700));display:grid;place-items:center;font-weight:900;font-size:24px;box-shadow:0 6px 20px rgba(255,77,46,.4);}
  .al-side .brand .nm{font-weight:900;font-size:22px;}
  .al-side .brand .nm small{display:block;font-size:10px;color:#8b919b;letter-spacing:2px;}
  .al-side .mid{margin-top:auto;margin-bottom:auto;position:relative;z-index:2;}
  .al-side .mid h1{font-size:40px;font-weight:900;letter-spacing:-1px;line-height:1.15;}
  .al-side .mid p{color:#aeb4be;font-size:15px;margin-top:14px;max-width:380px;line-height:1.7;}
  .al-stats{display:flex;gap:34px;margin-top:36px;}
  .al-stats .s b{font-size:26px;font-weight:900;display:block;color:var(--gold);}
  .al-stats .s span{font-size:12px;color:#8b919b;}
  .al-main{display:grid;place-items:center;padding:40px;}
  .al-card{width:100%;max-width:380px;}
  .al-card h2{font-size:26px;font-weight:900;}
  .al-card .sub{color:var(--ink-3);font-size:13.5px;margin:6px 0 30px;}
  .al-card .field{margin-bottom:18px;}
  .al-card .input{padding:13px 14px;}
  .role-pick{display:flex;gap:10px;margin-bottom:20px;}
  .role-pick .r{flex:1;border:1.5px solid var(--line-2);border-radius:10px;padding:11px;text-align:center;font-size:13px;cursor:pointer;}
  .role-pick .r.on{border-color:var(--brand);background:var(--brand-softer);color:var(--brand-700);font-weight:700;}
  .cap-row{display:flex;gap:10px;}
  .cap-row .cap{width:110px;border-radius:8px;background:linear-gradient(110deg,#88A6B8,#B79CC4);display:grid;place-items:center;color:#fff;font-weight:900;letter-spacing:3px;font-style:italic;font-size:18px;flex-shrink:0;}
</style>
</head>
<body>
<div class="alogin">
  <div class="al-side">
    <span class="blob b1"></span><span class="blob b2"></span>
    <div class="brand"><span class="mark">集</span><span class="nm">好集后台<small>HAOJI ADMIN</small></span></div>
    <div class="mid">
      <h1>综合百货<br>运营管理后台</h1>
      <p>商品、订单、用户、营销内容一站式管理。数据驱动决策，让运营更高效。</p>
      <div class="al-stats">
        <div class="s"><b>2.4万</b><span>在售商品</span></div>
        <div class="s"><b>18.6万</b><span>注册用户</span></div>
        <div class="s"><b>¥386万</b><span>本月成交</span></div>
      </div>
    </div>
    <div style="color:#5b6370;font-size:12px;position:relative;z-index:2">© 2026 好集 HAOJI · 仅授权管理员访问</div>
  </div>

  <div class="al-main">
    <div class="al-card">
      <h2>欢迎登录 👋</h2>
      <div class="sub">请输入管理员账号信息进入后台</div>

      <div class="role-pick">
        <div class="r on">超级管理员</div>
        <div class="r">运营专员</div>
        <div class="r">客服专员</div>
      </div>

      <div class="field"><label>管理员账号</label><input class="input" value="admin@haoji.com"></div>
      <div class="field"><label>登录密码</label><input class="input" type="password" value="············"></div>
      <div class="field"><label>验证码</label>
        <div class="cap-row"><input class="input" placeholder="请输入右侧字符"><span class="cap">7 H q 3</span></div></div>
      <div style="display:flex;justify-content:space-between;align-items:center;font-size:13px;margin:4px 0 22px">
        <label style="display:flex;gap:8px;align-items:center;color:var(--ink-2)"><span class="checkbox on">✓</span>记住登录状态</label>
        <a style="color:var(--brand)">忘记密码？</a>
      </div>
      <a class="btn btn-hot btn-lg btn-block" href="dashboard.html">登录后台</a>
      <p class="dim" style="font-size:11.5px;text-align:center;margin-top:16px">本系统仅限授权人员使用，所有操作将被记录</p>
    </div>
  </div>
</div>
</body>
</html>
