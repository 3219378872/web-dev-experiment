<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>好集 · 在线客服</title>
<link rel="stylesheet" href="../assets/app.css">
<style>
  .chat{display:grid;grid-template-columns:240px 1fr;height:600px;background:#fff;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;margin:14px 0 30px;}
  .chat-side{background:var(--bg);border-right:1px solid var(--line);display:flex;flex-direction:column;}
  .chat-side .agent{padding:18px;text-align:center;border-bottom:1px solid var(--line);}
  .chat-side .agent .av{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#FF7A45,var(--brand));color:#fff;display:grid;place-items:center;font-size:26px;margin:0 auto 10px;position:relative;}
  .chat-side .agent .av .on{position:absolute;bottom:2px;right:2px;width:14px;height:14px;border-radius:50%;background:var(--success);border:2px solid #fff;}
  .chat-side .agent b{font-size:15px;}
  .chat-side .agent .role{font-size:12px;color:var(--ink-3);}
  .chat-side .quick{padding:14px;}
  .chat-side .quick .qt{font-size:12px;color:var(--ink-3);margin-bottom:10px;font-weight:700;}
  .chat-side .quick a{display:block;padding:9px 12px;background:#fff;border:1px solid var(--line);border-radius:8px;font-size:12.5px;color:var(--ink-2);margin-bottom:8px;}
  .chat-side .quick a:hover{border-color:var(--brand);color:var(--brand);}
  .chat-main{display:flex;flex-direction:column;}
  .chat-head{padding:14px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;}
  .chat-head b{font-size:15px;}
  .chat-body{flex:1;overflow:auto;padding:20px;background:var(--bg);display:flex;flex-direction:column;gap:16px;}
  .msg{display:flex;gap:10px;max-width:70%;}
  .msg .av{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:grid;place-items:center;color:#fff;font-size:14px;font-weight:700;}
  .msg .bubble{background:#fff;border-radius:3px 12px 12px 12px;padding:11px 14px;font-size:13.5px;line-height:1.55;box-shadow:var(--shadow-1);}
  .msg.me{margin-left:auto;flex-direction:row-reverse;}
  .msg.me .bubble{background:var(--brand);color:#fff;border-radius:12px 3px 12px 12px;}
  .msg .time{font-size:10.5px;color:var(--ink-3);text-align:center;}
  .day-sep{text-align:center;font-size:11.5px;color:var(--ink-3);}
  .card-msg{background:#fff;border-radius:10px;padding:10px;box-shadow:var(--shadow-1);display:flex;gap:10px;width:260px;}
  .card-msg .ph{width:54px;height:54px;border-radius:8px;flex-shrink:0;}
  .card-msg .nm{font-size:12.5px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .card-msg .pr{color:var(--price);font-weight:900;font-size:14px;margin-top:4px;}
  .chat-input{border-top:1px solid var(--line);padding:12px 16px;}
  .chat-tools{display:flex;gap:14px;color:var(--ink-3);font-size:17px;margin-bottom:8px;}
  .chat-tools span{cursor:pointer;}
  .chat-tools span:hover{color:var(--brand);}
  .chat-send{display:flex;gap:10px;}
  .chat-send textarea{flex:1;border:1px solid var(--line-2);border-radius:8px;padding:10px;font-size:13.5px;resize:none;outline:0;font-family:inherit;}
</style>
</head>
<body data-cart="3" data-acct="service.html">
<div id="app-topbar"></div>
<div id="app-header"></div>
<div id="app-catnav"></div>

<div class="wrap">
  <div class="crumb"><a href="index.html">首页</a><span class="s">/</span><b style="color:var(--ink)">在线客服</b></div>

  <div class="chat">
    <div class="chat-side">
      <div class="agent">
        <div class="av">客<span class="on"></span></div>
        <b>好集客服 · 小集</b>
        <div class="role">在线 · 平均 30s 响应</div>
      </div>
      <div class="quick">
        <div class="qt">常见问题</div>
        <a>📦 我的订单什么时候发货？</a>
        <a>↺ 如何申请退货退款？</a>
        <a>🎟 优惠券怎么使用？</a>
        <a>🚚 支持哪些配送方式？</a>
        <a>💳 支持哪些支付方式？</a>
        <a>📞 人工客服热线 400-888-0099</a>
      </div>
    </div>

    <div class="chat-main">
      <div class="chat-head"><span style="width:9px;height:9px;border-radius:50%;background:var(--success);display:inline-block"></span><b>好集客服 · 小集</b><span class="dim" style="font-size:12px">为您服务</span></div>
      <div class="chat-body">
        <div class="day-sep">今天 14:28</div>
        <div class="msg"><div class="av" style="background:var(--brand)">客</div>
          <div class="bubble">您好，欢迎来到好集！很高兴为您服务，请问有什么可以帮您？😊</div></div>
        <div class="msg me"><div class="av" style="background:#88A6B8">林</div>
          <div class="bubble">我买的蓝牙耳机什么时候能发货呀？</div></div>
        <div class="msg"><div class="av" style="background:var(--brand)">客</div>
          <div class="bubble">已为您查询到订单 202605281588001，商品为现货，将在付款后 24 小时内发出，请您放心～</div></div>
        <div class="msg"><div class="av" style="background:var(--brand)">客</div>
          <div class="card-msg"><div class="ph s4" data-label=""></div>
            <div><div class="nm">TWS 主动降噪蓝牙耳机 入耳式</div><div class="pr">¥299</div></div></div></div>
        <div class="msg me"><div class="av" style="background:#88A6B8">林</div>
          <div class="bubble">好的，谢谢！</div></div>
      </div>
      <div class="chat-input">
        <div class="chat-tools"><span>😊</span><span>🖼</span><span>📎</span><span>📦 订单</span></div>
        <div class="chat-send">
          <textarea rows="2" placeholder="请输入您的问题…"></textarea>
          <button class="btn btn-primary" style="align-self:flex-end">发送</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="app-footer"></div>
<script src="../assets/data.js"></script>
<script src="../assets/shared.js"></script>
</body>
</html>
