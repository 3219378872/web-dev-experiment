<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>好集 · 注册</title>
<link rel="stylesheet" href="../assets/app.css">
<link rel="stylesheet" href="../assets/auth.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-top"><a class="logo" href="index.html"><span class="mark">集</span><span class="name">好集<small>HAOJI MALL</small></span></a></div>
  <div class="auth-wrap">
    <div class="auth-promo">
      <div class="eyebrow">新人专享</div>
      <h1>注册好集<br>立得 90 元新人礼包</h1>
      <p>注册即送 ¥20 + ¥50 + 9折券组合，首单再享会员价，下单更省心。</p>
      <div class="auth-feats">
        <div class="f"><span class="d">🎁</span>90元新人礼包</div>
        <div class="f"><span class="d">🚚</span>新人免邮券</div>
        <div class="f"><span class="d">💎</span>会员成长体系</div>
      </div>
    </div>

    <div class="auth-card">
      <h2>创建账号</h2>
      <div class="sub">已有账号？<a href="login.html" style="color:var(--brand);font-weight:700">直接登录 ›</a></div>

      <div class="field"><label>邮箱地址</label>
        <input class="input" placeholder="用于登录与找回密码，如 name@mail.com"></div>
      <div class="field"><label>手机号</label>
        <input class="input" placeholder="请输入 11 位手机号"></div>
      <div class="field"><label>验证码</label>
        <div class="code-row"><input class="input" placeholder="6 位验证码"><button class="btn btn-outline">获取验证码</button></div></div>
      <div class="field"><label>设置密码</label>
        <input class="input" type="password" placeholder="8-20 位，含字母与数字">
        <div class="strength"><i class="on"></i><i class="on"></i><i class="on"></i><i></i></div>
        <span class="dim" style="font-size:11.5px">密码强度：中</span></div>
      <div class="field"><label>确认密码</label>
        <input class="input" type="password" placeholder="请再次输入密码"></div>

      <div class="agree"><span class="checkbox on" style="margin-top:1px">✓</span>
        <span>我已阅读并同意《<a>好集用户协议</a>》和《<a>隐私政策</a>》</span></div>
      <a class="btn btn-hot btn-lg btn-block" href="login.html">注 册</a>
    </div>
  </div>
</div>
</body>
</html>
