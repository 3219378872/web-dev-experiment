<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>好集 · 意见反馈</title>
<link rel="stylesheet" href="../assets/app.css">
<style>
  .fb-grid{display:grid;grid-template-columns:1fr 320px;gap:18px;align-items:start;}
  .fb-type{display:flex;gap:10px;flex-wrap:wrap;}
  .fb-type .t{border:1.5px solid var(--line-2);border-radius:10px;padding:14px 18px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:13.5px;}
  .fb-type .t.on{border-color:var(--brand);background:var(--brand-softer);color:var(--brand-700);font-weight:700;}
  .fb-type .t .ic{font-size:18px;}
  .up-zone{border:2px dashed var(--line-2);border-radius:10px;padding:24px;text-align:center;color:var(--ink-3);}
  .up-zone .ic{font-size:32px;}
  .hist{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--bg);}
  .hist:last-child{border-bottom:0;}
  .hist .st{flex-shrink:0;}
  .hist .ct{flex:1;}
  .hist .ct .q{font-size:13.5px;color:var(--ink);}
  .hist .ct .r{font-size:12.5px;color:var(--ink-2);background:var(--bg);border-radius:8px;padding:9px 12px;margin-top:8px;border-left:3px solid var(--brand);}
  .hist .ct .time{font-size:11.5px;color:var(--ink-3);margin-top:6px;}
</style>
</head>
<body data-cart="3" data-acct="feedback.html">
<div id="app-topbar"></div>
<div id="app-header"></div>
<div id="app-catnav"></div>

<div class="wrap">
  <div class="crumb"><a href="index.html">首页</a><span class="s">/</span><b style="color:var(--ink)">意见反馈</b></div>

  <div class="acct-layout">
    <div id="app-account"></div>

    <main>
      <div class="fb-grid">
        <div class="panel">
          <div class="panel-head"><h3>✍ 意见反馈</h3><span class="dim" style="font-size:13px">您的建议是我们前进的动力</span></div>
          <div class="panel-pad">
            <div class="field" style="margin-bottom:18px"><label>反馈类型</label>
              <div class="fb-type">
                <span class="t on"><span class="ic">🐞</span>功能异常</span>
                <span class="t"><span class="ic">💡</span>体验建议</span>
                <span class="t"><span class="ic">📦</span>商品问题</span>
                <span class="t"><span class="ic">🚚</span>物流配送</span>
                <span class="t"><span class="ic">💬</span>其他</span>
              </div>
            </div>
            <div class="field" style="margin-bottom:18px"><label>问题描述</label>
              <textarea class="input" rows="5" placeholder="请详细描述您遇到的问题或建议，我们会认真处理（5-500字）"></textarea>
              <div class="dim" style="font-size:11.5px;text-align:right;margin-top:4px">0 / 500</div>
            </div>
            <div class="field" style="margin-bottom:18px"><label>上传截图（选填，最多 4 张）</label>
              <div class="up-zone"><div class="ic">📷</div><div style="margin-top:8px">点击或拖拽上传图片<br><span style="font-size:11.5px">支持 JPG / PNG，单张不超过 5MB</span></div></div>
            </div>
            <div class="field" style="margin-bottom:18px"><label>联系方式（选填）</label>
              <input class="input" placeholder="留下手机号或邮箱，方便我们与您联系" value="linxiao@haoji.com"></div>
            <button class="btn btn-hot btn-lg">提交反馈</button>
          </div>
        </div>

        <aside>
          <div class="panel">
            <div class="panel-head"><h3 style="font-size:15px">我的反馈记录</h3></div>
            <div class="panel-pad">
              <div class="hist"><span class="st"><span class="tag tag-success">已回复</span></span>
                <div class="ct"><div class="q">购物车优惠券无法叠加使用</div>
                  <div class="r">感谢反馈！该问题已修复，现支持平台券 + 品类券叠加，给您带来不便敬请谅解～</div>
                  <div class="time">2026-05-20 提交 · 客服小集 回复</div></div></div>
              <div class="hist"><span class="st"><span class="tag tag-warn">处理中</span></span>
                <div class="ct"><div class="q">建议增加商品到货提醒功能</div>
                  <div class="time">2026-05-26 提交 · 已转交产品团队</div></div></div>
              <div class="hist"><span class="st"><span class="tag tag-ghost">已关闭</span></span>
                <div class="ct"><div class="q">App 闪退问题（已解决）</div>
                  <div class="time">2026-05-12 提交</div></div></div>
            </div>
          </div>
        </aside>
      </div>
    </main>
  </div>
</div>

<div id="app-footer"></div>
<script src="../assets/data.js"></script>
<script src="../assets/shared.js"></script>
</body>
</html>
