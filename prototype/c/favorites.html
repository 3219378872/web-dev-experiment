<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>好集 · 我的收藏</title>
<link rel="stylesheet" href="../assets/app.css">
<style>
  .fav-bar{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .fav-bar .tabs{flex:1;border:0;}
  .pcard .fav-x{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.92);color:var(--brand);display:grid;place-items:center;font-size:14px;z-index:3;}
  .pcard{position:relative;}
  .pcard .fav-add{margin-top:8px;}
  .empty{background:#fff;border:1px dashed var(--line-2);border-radius:var(--radius);text-align:center;padding:60px;color:var(--ink-3);}
</style>
</head>
<body data-cart="3" data-acct="favorites.html">
<div id="app-topbar"></div>
<div id="app-header"></div>
<div id="app-catnav"></div>

<div class="wrap">
  <div class="crumb"><a href="index.html">首页</a><span class="s">/</span>个人中心<span class="s">/</span><b style="color:var(--ink)">我的收藏</b></div>

  <div class="acct-layout">
    <div id="app-account"></div>

    <main>
      <div class="panel">
        <div class="panel-head"><h3>我的收藏 <span class="dim" style="font-weight:400;font-size:13px">共 8 件</span></h3>
          <div style="display:flex;gap:10px;align-items:center">
            <span class="muted" style="font-size:13px">管理</span>
          </div>
        </div>
        <div class="panel-pad">
          <div class="fav-bar">
            <div class="tabs">
              <button class="active">全部 (8)</button><button>手机数码 (3)</button>
              <button>家用电器 (2)</button><button>食品生鲜 (2)</button><button>降价提醒 (1)</button>
            </div>
            <span class="chip">↓ 收藏时间</span>
          </div>
          <div class="grid g4" id="fav-grid"></div>
        </div>
      </div>
    </main>
  </div>
</div>

<div id="app-footer"></div>
<script src="../assets/data.js"></script>
<script src="../assets/shared.js"></script>
<script>
  var favs = HAOJI.P.slice(0,8);
  document.getElementById('fav-grid').innerHTML = favs.map(function(p){
    var c = HAOJI.card(p);
    // inject fav-x button + cart action after the card
    return c.replace('<div class="body">','<span class="fav-x" title="取消收藏" onclick="event.preventDefault();this.closest(\'.pcard\').style.opacity=.35">✕</span><div class="body">')
            .replace('</div></a>','<button class="btn btn-outline btn-sm fav-add" onclick="event.preventDefault();location.href=\'cart.html\'">加入购物车</button></div></a>');
  }).join('');
</script>
</body>
</html>
