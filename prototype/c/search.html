<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>好集 · 搜索结果</title>
<link rel="stylesheet" href="../assets/app.css">
<style>
  .srow{display:flex;align-items:center;gap:14px;margin:6px 0 16px;flex-wrap:wrap;}
  .srow h2{font-size:18px;font-weight:700;}
  .srow h2 b{color:var(--brand);}
  .related{display:flex;gap:8px;align-items:center;font-size:13px;color:var(--ink-3);flex-wrap:wrap;}
  .related a{padding:3px 11px;border:1px solid var(--line-2);border-radius:999px;color:var(--ink-2);font-size:12.5px;background:#fff;}
  .related a:hover{border-color:var(--brand);color:var(--brand);}

  .sortbar{background:#fff;border:1px solid var(--line);border-radius:var(--radius);display:flex;align-items:center;gap:4px;padding:10px 14px;margin-bottom:14px;}
  .sortbar .s{padding:7px 15px;border-radius:7px;font-size:13px;font-weight:500;color:var(--ink-2);display:flex;align-items:center;gap:4px;cursor:pointer;}
  .sortbar .s.on{background:var(--brand);color:#fff;font-weight:700;}
  .sortbar .s:hover:not(.on){color:var(--brand);}
  .sortbar .mode{margin-left:auto;display:flex;gap:6px;align-items:center;font-size:12.5px;color:var(--ink-3);}
  .sortbar .mode .tg{display:inline-flex;border:1px solid var(--line-2);border-radius:7px;overflow:hidden;}
  .sortbar .mode .tg span{padding:5px 10px;font-size:12px;color:var(--ink-2);}
  .sortbar .mode .tg span.on{background:var(--brand-soft);color:var(--brand-700);font-weight:700;}

  .empty-hint{background:var(--gold-soft);border:1px solid #F3D9A0;border-radius:10px;padding:10px 16px;font-size:12.5px;color:#8a5d00;margin-bottom:14px;}
</style>
</head>
<body data-cart="3">
<div id="app-topbar"></div>
<div id="app-header"></div>
<div id="app-catnav"></div>

<div class="wrap">
  <div class="crumb"><a href="index.html">首页</a><span class="s">/</span>搜索结果</div>

  <div class="srow">
    <h2>“<b>蓝牙耳机</b>” 的搜索结果</h2>
    <span class="muted" style="font-size:13px">为您找到 <b style="color:var(--price)">328</b> 件相关商品</span>
  </div>
  <div class="related" style="margin-bottom:14px">
    <span>相关搜索：</span>
    <a>降噪耳机</a><a>蓝牙耳机 入耳式</a><a>无线耳机</a><a>运动耳机</a><a>头戴式耳机</a><a>骨传导</a>
  </div>

  <div class="empty-hint">🔎 已为您开启「模糊匹配」，同时展示精准匹配与相关推荐。可在右侧切换匹配模式。</div>

  <div class="sortbar">
    <span class="s on">综合排序</span>
    <span class="s">销量 ↓</span>
    <span class="s">价格 ↑</span>
    <span class="s">价格 ↓</span>
    <span class="s">新品优先</span>
    <span class="s">好评优先</span>
    <span class="mode">
      匹配：<span class="tg"><span class="on">模糊</span><span>精准</span></span>
    </span>
  </div>

  <div class="grid g5" id="s-grid"></div>

  <div class="pager">
    <span>‹ 上一页</span>
    <a class="cur">1</a><a>2</a><a>3</a><a>4</a><a>5</a><span class="dots">…</span><a>14</a>
    <a>下一页 ›</a>
  </div>
</div>

<div id="app-footer"></div>
<script src="../assets/data.js"></script>
<script src="../assets/shared.js"></script>
<script>
  // 优先展示数码类，模拟搜索"蓝牙耳机"
  var list = HAOJI.P.filter(function(x){return x.cat=='手机数码';})
            .concat(HAOJI.P).slice(0,15);
  HAOJI.renderGrid('#s-grid', list);
</script>
</body>
</html>
