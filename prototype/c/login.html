<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>好集 · 登录</title>
<link rel="stylesheet" href="../assets/app.css">
<link rel="stylesheet" href="../assets/auth.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-top"><a class="logo" href="index.html"><span class="mark">集</span><span class="name">好集<small>HAOJI MALL</small></span></a></div>
  <div class="auth-wrap">
    <div class="auth-promo">
      <div class="eyebrow">欢迎回来</div>
      <h1>万物好集<br>登录即享会员价</h1>
      <p>登录后可享受会员专属折扣、积分商城、收藏夹同步与订单全程跟踪。</p>
      <div class="auth-feats">
        <div class="f"><span class="d">🎟</span>专属优惠券</div>
        <div class="f"><span class="d">⚡</span>限时秒杀提醒</div>
        <div class="f"><span class="d">🛡</span>账户安全保障</div>
      </div>
    </div>

    <div class="auth-card">
      <div class="tabs">
        <a class="active">账号登录</a><a>短信登录</a>
      </div>
      <div class="field"><label>账号 / 邮箱 / 手机号</label>
        <input class="input" placeholder="请输入账号、邮箱或手机号" value="linxiao@haoji.com"></div>
      <div class="field"><label>登录密码</label>
        <input class="input" type="password" placeholder="请输入密码" value="········"></div>
      <div class="row-between">
        <label style="display:flex;gap:8px;align-items:center;color:var(--ink-2)"><span class="checkbox on">✓</span>记住密码</label>
        <a href="forgot.html">忘记密码？</a>
      </div>
      <a class="btn btn-hot btn-lg btn-block" href="index.html">登 录</a>
      <div class="other">还没有账号？<a href="register.html" style="color:var(--brand);font-weight:700">立即注册 ›</a></div>
      <div class="other" style="margin-top:18px;position:relative">
        <span style="background:#fff;padding:0 12px;position:relative;z-index:2">其他登录方式</span>
        <span style="position:absolute;left:0;right:0;top:50%;height:1px;background:var(--line)"></span>
      </div>
      <div class="socials">
        <a class="s">微</a><a class="s">支</a><a class="s">Q</a><a class="s">微博</a>
      </div>
    </div>
  </div>
</div>
</body>
</html>
