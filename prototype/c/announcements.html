<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>好集 · 系统公告</title>
<link rel="stylesheet" href="../assets/app.css">
<style>
  .ann-layout{display:grid;grid-template-columns:200px 1fr;gap:18px;margin:14px 0 30px;align-items:start;}
  .ann-cats{background:#fff;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;position:sticky;top:88px;}
  .ann-cats a{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;font-size:13.5px;color:var(--ink-2);border-bottom:1px solid var(--bg);}
  .ann-cats a:last-child{border-bottom:0;}
  .ann-cats a.on{background:var(--brand-soft);color:var(--brand-700);font-weight:700;border-right:3px solid var(--brand);}
  .ann-cats a:hover{background:var(--brand-softer);color:var(--brand);}
  .ann-cats a .n{font-size:11px;background:var(--bg-2);color:var(--ink-3);padding:1px 7px;border-radius:999px;}
  .ann{display:flex;gap:16px;padding:18px 20px;border-bottom:1px solid var(--line);}
  .ann:last-child{border-bottom:0;}
  .ann .date{flex-shrink:0;text-align:center;width:60px;}
  .ann .date .d{font-size:24px;font-weight:900;color:var(--brand);line-height:1;}
  .ann .date .m{font-size:11px;color:var(--ink-3);margin-top:4px;}
  .ann .ct{flex:1;}
  .ann .ct .tt{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;}
  .ann .ct .ds{font-size:13px;color:var(--ink-2);margin-top:7px;line-height:1.6;}
  .ann .ct .meta{font-size:11.5px;color:var(--ink-3);margin-top:9px;display:flex;gap:14px;}
  .ann:hover .tt{color:var(--brand);}
</style>
</head>
<body data-cart="3" data-acct="announcements.html">
<div id="app-topbar"></div>
<div id="app-header"></div>
<div id="app-catnav"></div>

<div class="wrap">
  <div class="crumb"><a href="index.html">首页</a><span class="s">/</span><b style="color:var(--ink)">系统公告</b></div>

  <div class="ann-layout">
    <aside class="ann-cats">
      <a class="on">全部公告 <span class="n">16</span></a>
      <a>活动促销 <span class="n">6</span></a>
      <a>系统通知 <span class="n">4</span></a>
      <a>规则更新 <span class="n">3</span></a>
      <a>安全公告 <span class="n">2</span></a>
      <a>维护通知 <span class="n">1</span></a>
    </aside>

    <main class="panel">
      <div class="panel-head"><h3>📢 系统公告</h3><span class="dim" style="font-size:13px">及时了解平台动态</span></div>
      <div id="ann-list"></div>
      <div class="pager"><span>‹</span><a class="cur">1</a><a>2</a><a>3</a><a>›</a></div>
    </main>
  </div>
</div>

<div id="app-footer"></div>
<script src="../assets/data.js"></script>
<script src="../assets/shared.js"></script>
<script>
var anns=[
 ['28','05月',['好集 618 年中狂欢节预热开启','置顶','tag-price'],'全场最高直降 60%，每满 300 减 50，叠加平台券更划算。6 月 1 日 0 点正式开抢，更有整点秒杀与抽奖福利等你来！','活动促销 · 12.3万阅读'],
 ['25','05月',['新增「当日达」配送服务上线','新','tag-new'],'即日起，上海、北京、杭州等 12 城核心区域支持当日达配送，下单后最快 4 小时送达。','系统通知 · 4.8万阅读'],
 ['20','05月',['《好集会员积分规则》更新公告','',''],'为提升会员权益，自 6 月 1 日起积分有效期延长至 24 个月，购物积分比例提升至 1:1，敬请关注。','规则更新 · 2.1万阅读'],
 ['18','05月',['关于谨防钓鱼诈骗的安全提示','重要','tag-warn'],'好集平台工作人员不会以任何理由要求您提供密码、验证码或进行转账。请通过官方渠道核实信息，谨防诈骗。','安全公告 · 6.5万阅读'],
 ['15','05月',['系统例行维护通知','',''],'为提供更稳定的服务，平台将于 5 月 16 日 02:00-04:00 进行系统升级维护，期间部分功能可能受影响，敬请谅解。','维护通知 · 1.2万阅读'],
 ['10','05月',['七天无理由退换货升级为「极速退款」','新','tag-new'],'符合条件的退货申请，确认后退款即时到账，无需等待商品退回，购物更安心。','规则更新 · 3.4万阅读']
];
document.getElementById('ann-list').innerHTML=anns.map(function(a){
  return '<div class="ann"><div class="date"><div class="d">'+a[0]+'</div><div class="m">'+a[1]+'</div></div>'+
    '<div class="ct"><div class="tt">'+a[2][0]+(a[2][1]?'<span class="tag '+a[2][2]+'">'+a[2][1]+'</span>':'')+'</div>'+
    '<div class="ds">'+a[3]+'</div><div class="meta"><span>'+a[4]+'</span><span>查看详情 ›</span></div></div></div>';
}).join('');
</script>
</body>
</html>
