server:
  port: 8085
spring:
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: jdbc:mysql://${hm.db.host}:3306/hmall?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${hm.db.pw}
  cloud:
    nacos:
      server-addr: ${spring.cloud.nacos.server-addr}
mybatis-plus:
  configuration:
    default-enum-type-handler: com.baomidou.mybatisplus.core.handlers.MybatisEnumTypeHandler
  global-config:
    db-config:
      update-strategy: not_null
      id-type: auto
knife4j:
  enable: true
  openapi:
    title: 黑马商城支付接口文档
    description: "黑马商城支付接口文档"
    email: zhanghuyi@itcast.cn
    concat: 虎哥
    url: https://www.itcast.cn
    version: v1.0.0
    group:
      default:
        group-name: default
        api-rule: package
        api-rule-resources:
          - com.hmall.controller
seata:
  enabled: ${SEATA_ENABLED:false}
  application-id: pay-service
  tx-service-group: hmall-tx-group
  data-source-proxy-mode: AT
  service:
    vgroup-mapping:
      hmall-tx-group: default
    grouplist:
      default: ${hm.seata.host:127.0.0.1}:8091
  config:
    type: file
  registry:
    type: nacos
    nacos:
      server-addr: ${spring.cloud.nacos.server-addr:127.0.0.1:8848}
      group: SEATA_GROUP
      application: seata-server
      username: nacos
      password: nacos
