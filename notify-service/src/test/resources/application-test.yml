spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/hmall?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/schema.sql

mybatis-plus:
  global-config:
    db-config:
      update-strategy: not_null
      id-type: auto
