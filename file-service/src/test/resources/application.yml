spring:
  cloud:
    bootstrap:
      enabled: false
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
  autoconfigure:
    exclude:
      - com.alibaba.cloud.nacos.NacosConfigAutoConfiguration
  datasource:
    url: jdbc:h2:mem:file_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=true
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

mybatis-plus:
  global-config:
    db-config:
      id-type: auto

file:
  upload-dir: /tmp/test-uploads
