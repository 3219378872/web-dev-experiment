server:
  port: 8082
spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: cart-service
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://${hm.db.host}:3306/hmall?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${hm.db.pw}
  cloud:
    nacos:
      server-addr: ${spring.cloud.nacos.server-addr}
mybatis-plus:
  configuration:
    default-enum-type-handler: com.baomidou.mybatisplus.core.handlers.MybatisEnumTypeHandler
  global-config:
    db-config:
      update-strategy: not_null
      id-type: auto
knife4j:
  enable: true
  openapi:
    title: 黑马商城购物车接口文档
    description: "购物车有关接口"
    email: zhanghuyi@itcast.cn
    concat: Lee
    url: https://www.itcast.cn
    version: v1.0.0
    group:
      default:
        group-name: default
        api-rule: package
        api-rule-resources:
          - com.hmall.cart.controller
hm:
  cart:
    # 购物车最大条目数。原项目放 nacos 共享配置，本仓库 nacos 未初始化该配置，
    # 缺省会使 CartProperties.maxItems 为 null，checkCartsFull 拆箱抛 NPE（POST /carts 500）。
    max-items: 10
feign:
  okhttp:
    enabled: true
logging:
  level:
    com.hmall: debug
  pattern:
    dateformat: HH:mm:ss:SSS
  file:
    path: "logs/${spring.application.name}"
