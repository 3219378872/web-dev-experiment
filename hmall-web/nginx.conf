server {
    listen 80;
    server_name localhost;
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
    location /api/ {
        proxy_pass http://hm-gateway:8080/;
        proxy_set_header Host $host;
    }
    location /files/ {
        proxy_pass http://hm-gateway:8080/files/;
        proxy_set_header Host $host;
    }
    location /upload/ {
        proxy_pass http://hm-gateway:8080/upload/;
        proxy_set_header Host $host;
    }
}
